<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="ClipForge PAKT">
  <title>ClipForge PAKT</title>
  <defs>
    <linearGradient id="cfGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cfPipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Mark: braces compressing into pipes -->
  <g transform="translate(12 14)">
    <!-- Rounded square backdrop -->
    <rect x="0" y="0" width="92" height="92" rx="20" ry="20" fill="url(#cfGrad)"/>
    <!-- Left brace -->
    <path d="M30 24 C22 24 22 38 22 46 C22 50 18 50 16 50 C18 50 22 50 22 54 C22 62 22 76 30 76"
          fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <!-- Right brace -->
    <path d="M62 24 C70 24 70 38 70 46 C70 50 74 50 76 50 C74 50 70 50 70 54 C70 62 70 76 62 76"
          fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <!-- Three pipes (PAKT pipe-aligned) -->
    <rect x="38" y="36" width="3.5" height="28" rx="1.75" fill="#ffffff"/>
    <rect x="44.25" y="36" width="3.5" height="28" rx="1.75" fill="#ffffff"/>
    <rect x="50.5" y="36" width="3.5" height="28" rx="1.75" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(124 0)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
    <text x="0" y="56" font-size="34" font-weight="700" fill="#0f172a" letter-spacing="-0.5">ClipForge</text>
    <text x="206" y="56" font-size="34" font-weight="800" fill="url(#cfGrad)" letter-spacing="0.5">PAKT</text>
    <text x="0" y="86" font-size="13" font-weight="500" fill="#64748b" letter-spacing="0.4">Lossless prompt compression • 27–69% fewer tokens</text>
  </g>
</svg>
