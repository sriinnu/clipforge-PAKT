<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="pakt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="pakt-chevron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Left chevron: compression "squeeze" -->
  <polygon points="8,10 24,30 8,50" fill="none" stroke="url(#pakt-grad)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" />

  <!-- Second left chevron (tighter) -->
  <polygon points="22,14 34,30 22,46" fill="none" stroke="url(#pakt-grad)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6" />

  <!-- "PAKT" text -->
  <text x="50" y="42" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="36" font-weight="700" fill="url(#pakt-grad)" letter-spacing="3">PAKT</text>

  <!-- Right chevron (mirror) -->
  <polygon points="218,14 206,30 218,46" fill="none" stroke="url(#pakt-grad)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6" />

  <!-- Second right chevron -->
  <polygon points="232,10 216,30 232,50" fill="none" stroke="url(#pakt-grad)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" />
</svg>
