<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <defs>
    <linearGradient id="cf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Clipboard icon -->
  <!-- Clipboard body (rounded rect) -->
  <rect x="6" y="12" width="30" height="40" rx="4" ry="4" fill="none" stroke="url(#cf-grad)" stroke-width="2.5" />

  <!-- Clipboard clip (top tab) -->
  <rect x="14" y="6" width="14" height="10" rx="2" ry="2" fill="url(#cf-grad)" />

  <!-- Forge spark lines on clipboard -->
  <line x1="14" y1="28" x2="28" y2="28" stroke="url(#cf-grad)" stroke-width="2" stroke-linecap="round" />
  <line x1="14" y1="34" x2="24" y2="34" stroke="url(#cf-grad)" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <line x1="14" y1="40" x2="20" y2="40" stroke="url(#cf-grad)" stroke-width="2" stroke-linecap="round" opacity="0.4" />

  <!-- Forge anvil spark -->
  <circle cx="34" cy="16" r="1.5" fill="#8b5cf6" opacity="0.8" />
  <circle cx="38" cy="12" r="1" fill="#6366f1" opacity="0.6" />

  <!-- "ClipForge" text -->
  <text x="48" y="42" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="32" font-weight="700" fill="url(#cf-grad)" letter-spacing="1">ClipForge</text>
</svg>
