<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PAKT mark: chevrons pressing into the pipe. Kept in sync with assets/pakt-icon.svg. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151938" />
      <stop offset="1" stop-color="#0a0c1f" />
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d2fe" />
      <stop offset="0.5" stop-color="#818cf8" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="chevL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5" />
      <stop offset="1" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="chevR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14.5" fill="url(#tile)" />
  <path d="M 16,18.5 L 24.8,32 L 16,45.5" fill="none" stroke="url(#chevL)" stroke-width="6.2" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 48,18.5 L 39.2,32 L 48,45.5" fill="none" stroke="url(#chevR)" stroke-width="6.2" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="29.4" y="14" width="5.2" height="36" rx="2.6" fill="url(#pipe)" />
</svg>
