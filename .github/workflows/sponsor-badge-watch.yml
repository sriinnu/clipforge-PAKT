name: Sponsor badge watch

# Re-enables sponsorship surfaces once the repo crosses
# `SPONSOR_BADGE_MIN_STARS` stargazers:
#   - README.md badges (between SPONSOR-BADGES markers)
#   - .github/FUNDING.yml entries (github + buy_me_a_coffee)
# Until the threshold is hit, both stay empty/commented so the README
# header and the GitHub-rendered Sponsor button stay hidden. At the
# threshold, a single PR flips both on atomically.

on:
  schedule:
    # Every Monday 00:00 UTC — cheap check, no urgency.
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SPONSOR_BADGE_MIN_STARS: '500'
  README_PATH: README.md
  FUNDING_PATH: .github/FUNDING.yml
  BRANCH_NAME: chore/reinsert-sponsor-badges

jobs:
  check-and-reinsert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count stargazers
        id: stars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api "repos/${{ github.repository }}" --jq '.stargazers_count')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Current stargazers: $count (threshold: $SPONSOR_BADGE_MIN_STARS)"

      - name: Check README marker state
        id: marker
        run: |
          if ! grep -q 'SPONSOR-BADGES-START' "$README_PATH"; then
            echo "state=missing-markers" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Extract whatever sits between the markers, strip HTML comments + whitespace.
          body=$(awk '/SPONSOR-BADGES-START/{flag=1; next} /SPONSOR-BADGES-END/{flag=0} flag' "$README_PATH" \
            | sed -E 's/<!--.*-->//g' \
            | tr -d '[:space:]')
          if [ -z "$body" ]; then
            echo "state=empty" >> "$GITHUB_OUTPUT"
          else
            echo "state=filled" >> "$GITHUB_OUTPUT"
          fi

      - name: Check FUNDING.yml state
        id: funding
        run: |
          if [ ! -f "$FUNDING_PATH" ]; then
            echo "state=missing-file" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # An "active" entry is a non-comment line with a key:value form.
          if grep -qE '^[[:space:]]*[a-z_]+:' "$FUNDING_PATH"; then
            echo "state=filled" >> "$GITHUB_OUTPUT"
          else
            echo "state=empty" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide action
        id: decide
        run: |
          if [ "${{ steps.marker.outputs.state }}" = "missing-markers" ]; then
            echo "README is missing the SPONSOR-BADGES markers; manual attention needed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.funding.outputs.state }}" = "missing-file" ]; then
            echo "FUNDING.yml is missing; manual attention needed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.marker.outputs.state }}" = "filled" ] \
             && [ "${{ steps.funding.outputs.state }}" = "filled" ]; then
            echo "README badges and FUNDING.yml already live — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.stars.outputs.count }}" -lt "$SPONSOR_BADGE_MIN_STARS" ]; then
            echo "Under threshold (${{ steps.stars.outputs.count }} < $SPONSOR_BADGE_MIN_STARS) — keep sponsorship hidden."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Re-insert README badges
        if: steps.decide.outputs.skip == 'false' && steps.marker.outputs.state == 'empty'
        run: |
          python3 - <<'PY'
          import pathlib, re, os
          owner_repo = os.environ['GITHUB_REPOSITORY']
          owner = owner_repo.split('/')[0]
          badges = (
            '  <a href="https://github.com/sponsors/' + owner + '">'
            '<img src="https://img.shields.io/badge/Sponsor-ec4899?logo=githubsponsors&logoColor=white" alt="Sponsor on GitHub" /></a>\n'
            '  <a href="https://buymeacoffee.com/' + owner + '">'
            '<img src="https://img.shields.io/badge/Buy%20Me%20a%20Coffee-ffdd00?logo=buymeacoffee&logoColor=black" alt="Buy Me a Coffee" /></a>\n'
          )
          path = pathlib.Path(os.environ['README_PATH'])
          src = path.read_text()
          pattern = re.compile(r'(<!-- SPONSOR-BADGES-START -->)(.*?)(<!-- SPONSOR-BADGES-END -->)', re.DOTALL)
          replacement = r'\1\n' + badges + r'\3'
          new = pattern.sub(replacement, src, count=1)
          path.write_text(new)
          PY

      - name: Restore FUNDING.yml entries
        if: steps.decide.outputs.skip == 'false' && steps.funding.outputs.state == 'empty'
        run: |
          python3 - <<'PY'
          import pathlib, os
          owner_repo = os.environ['GITHUB_REPOSITORY']
          owner = owner_repo.split('/')[0]
          path = pathlib.Path(os.environ['FUNDING_PATH'])
          src = path.read_text()
          # Uncomment the two canonical lines. Leaves all other `# ko_fi:` etc. commented.
          replacements = {
            '# github: [' + owner + ']': 'github: [' + owner + ']',
            '# buy_me_a_coffee: ' + owner: 'buy_me_a_coffee: ' + owner,
          }
          for old, new in replacements.items():
            src = src.replace(old, new)
          path.write_text(src)
          PY

      - name: Open PR
        if: steps.decide.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: ${{ env.BRANCH_NAME }}
          commit-message: 'chore: re-enable sponsorship surfaces (stargazers crossed threshold)'
          title: 'chore: re-enable sponsorship surfaces (stargazers crossed threshold)'
          body: |
            Stargazer count is **${{ steps.stars.outputs.count }}**, which meets the
            `SPONSOR_BADGE_MIN_STARS` threshold (**${{ env.SPONSOR_BADGE_MIN_STARS }}**).

            This PR re-enables both sponsorship surfaces that were held back pre-launch:

            - **README.md** — Sponsor + Buy-Me-a-Coffee badges between the `SPONSOR-BADGES` markers.
            - **.github/FUNDING.yml** — `github` and `buy_me_a_coffee` entries, which drive the
              GitHub-rendered sidebar "Sponsor this project" button and the repo-header Sponsor button.

            Triggered by `.github/workflows/sponsor-badge-watch.yml`.
          delete-branch: true
